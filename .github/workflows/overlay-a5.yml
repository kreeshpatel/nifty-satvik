name: overlay-a5

# A5 harness-trust gate — run the regime-to-cash overlay through the real promotion harness on the
# PINNED corrected universe and FAIL if the harness false-promotes a no-edge overlay. Manual dispatch.
on:
  workflow_dispatch:
    inputs:
      pin_tag:
        description: "release tag of the pinned ohlcv.pkl snapshot"
        default: "dataset-pin-20260701"
      start:
        description: "backtest start (YYYY-MM-DD)"
        default: "2017-01-01"

concurrency:
  group: overlay-a5
  cancel-in-progress: false

jobs:
  a5:
    name: A5 harness-trust (Python 3.12, Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      GH_TOKEN: ${{ github.token }}     # lets the script fetch the pinned snapshot via gh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run A5 harness-trust gate
        run: |
          python scripts/run_overlay_a5.py \
            --mode corrected \
            --start "${{ github.event.inputs.start }}" \
            --pinned-release "${{ github.event.inputs.pin_tag }}"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overlay-a5
          path: results/overlay_a5.json
          if-no-files-found: warn
          retention-days: 30
