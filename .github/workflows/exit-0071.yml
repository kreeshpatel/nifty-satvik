name: exit-0071

# LOCK Step 2 / pre-reg 0071 — "let winners run" exit arms (B stop_only PRIMARY / C no_trailing /
# D no_target) vs production, through the MECHANIZED promotion bar, on the PINNED universe. Manual dispatch.
on:
  workflow_dispatch:
    inputs:
      pin_tag:
        description: "release tag of the pinned ohlcv.pkl snapshot"
        default: "dataset-pin-20260701"
      start:
        description: "backtest start (YYYY-MM-DD)"
        default: "2017-01-01"

concurrency:
  group: exit-0071
  cancel-in-progress: false

jobs:
  exit0071:
    name: 0071 let-winners-run (Python 3.12, Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run 0071 exit arms
        run: |
          python scripts/run_exit_0071.py \
            --mode corrected \
            --start "${{ github.event.inputs.start }}" \
            --pinned-release "${{ github.event.inputs.pin_tag }}"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exit-0071
          path: results/exit_0071.json
          if-no-files-found: warn
          retention-days: 30
