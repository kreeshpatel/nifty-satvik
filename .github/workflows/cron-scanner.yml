name: cron-scanner

# Stage-E daily paper-trading cron: refresh OHLCV → step the PaperBook one session → commit the
# persisted state (results/paper_*.json, portfolio_history.csv, signals_today.json, kill_state.json)
# so it survives across runs. Live == backtest (PaperBook reuses the engine kernels; parity-gated).
on:
  workflow_dispatch:
    inputs:
      inception:
        description: "paper inception date YYYY-MM-DD (book trades forward from here)"
        default: "2026-05-30"
  schedule:
    - cron: "0 11 * * 1-5"      # 11:00 UTC = 16:30 IST, after the 15:30 NSE close, weekdays

concurrency:
  group: cron-scanner
  cancel-in-progress: false

permissions:
  contents: write               # to commit the persisted paper state back to the repo

jobs:
  paper:
    name: paper cron (Python 3.12, Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run paper cron
        run: |
          python scripts/run_paper_cron.py \
            --mode current \
            --start "${{ github.event.inputs.inception || '2026-05-30' }}"
      - name: Commit persisted paper state
        run: |
          git config user.name "paper-cron"
          git config user.email "paper-cron@users.noreply.github.com"
          git add results/paper_state.json results/paper_portfolio.json results/paper_trades.json \
                  results/portfolio_history.csv results/paper_ledger_history.csv \
                  results/signals_today.json results/kill_state.json 2>/dev/null || true
          git commit -m "chore(paper): daily cron state $(date -u +%F)" || echo "no state change"
          git push || echo "nothing to push"
