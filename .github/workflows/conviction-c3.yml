name: conviction-c3

# Stage-C / C3 — conviction-weighted SIZING vs flat, through the real promotion harness on the
# PINNED universe. This IS an n_trials trial (PROMOTE/KILL). Manual dispatch.
on:
  workflow_dispatch:
    inputs:
      pin_tag:
        description: "release tag of the pinned ohlcv.pkl snapshot"
        default: "dataset-pin-20260701"
      start:
        description: "backtest start (YYYY-MM-DD)"
        default: "2017-01-01"

concurrency:
  group: conviction-c3
  cancel-in-progress: false

jobs:
  c3:
    name: C3 conviction sizing (Python 3.12, Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run C3 conviction sizing
        run: |
          python scripts/run_conviction_c3.py \
            --mode corrected \
            --start "${{ github.event.inputs.start }}" \
            --pinned-release "${{ github.event.inputs.pin_tag }}"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conviction-c3
          path: results/conviction_c3.json
          if-no-files-found: warn
          retention-days: 30
