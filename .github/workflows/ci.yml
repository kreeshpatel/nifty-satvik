name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['results/**']
  pull_request:
    branches: [main]
    paths-ignore: ['results/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests (Python 3.12, Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pin native threading single-threaded — guards against the LightGBM/OpenMP
      # + numpy/pandas BLAS native segfaults seen on this runner class. nq/ has no
      # heavy native ML libs, so this is belt-and-suspenders.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check nq tests || true
      - name: Typecheck (mypy --strict)
        # Advisory while the package is young; graduates to a hard gate.
        run: mypy --strict nq || true
      - name: Tests
        # No --cov (coverage instrumentation segfaulted the old runner).
        run: pytest -v --tb=short
