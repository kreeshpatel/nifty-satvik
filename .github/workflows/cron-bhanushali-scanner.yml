name: cron-bhanushali-scanner

# The 0091 weekly-swing FORWARD-WATCH paper book. A weekly-swing strategy only changes after Friday's
# weekly close, so it runs on its OWN weekly schedule — every Saturday 6 PM IST — not in the daily
# momentum cron. It self-downloads OHLCV, re-runs the 0091 engine from inception, and commits the
# results/*_weekly.* dashboard files. Paper only; never touches the momentum book, the live config, or
# any kill/wall state.
on:
  workflow_dispatch:
    inputs:
      inception:
        description: "weekly-book inception YYYY-MM-DD (clean forward start)"
        default: "2026-07-04"
  schedule:
    - cron: "30 12 * * 6"       # 12:30 UTC Saturday = 18:00 (6 PM) IST Saturday

concurrency:
  group: cron-bhanushali-scanner
  cancel-in-progress: false

permissions:
  contents: write               # commits the weekly paper state back to the repo

jobs:
  weekly:
    name: weekly-swing paper cron (Python 3.12, Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run weekly-swing (0093 + Nifty-50 CRS) paper cron
        run: python scripts/run_bhanushali_cron.py --start "${{ github.event.inputs.inception || '2026-07-04' }}"
      - name: Refresh forward-review scorecard (Oct-1 promote/kill machinery, forward/prereg.md gates)
        run: python scripts/bhanushali_review_scorecard.py
      - name: Commit weekly paper state
        run: |
          # Author with the owner's GitHub-matched email so Vercel (auto-deploys main) doesn't
          # BLOCK the commit as an unrecognized author.
          git config user.name "kreeshpatel"
          git config user.email "kreeshvasistha@gmail.com"
          git add results/signals_today_weekly.json results/signals_history_weekly.json \
                  results/signal_analytics_weekly.json results/paper_portfolio_weekly.json \
                  results/portfolio_history_weekly.csv results/weekly_review_scorecard.json 2>/dev/null || true
          if git commit -m "chore(weekly): Saturday weekly-swing paper state $(date -u +%F)"; then
            # --autostash: the OHLCV download leaves UNSTAGED cache changes that abort a plain
            # `git pull --rebase`, which silently swallowed the push as "nothing to push" and dropped
            # the freshly-computed state every week (2026-07-11: 18 signals + 3 holds computed, never
            # published). Autostash + retry publishes it; a persistent failure now exits RED (visible)
            # instead of stranding stale picks on the dashboard.
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push origin main && { echo "pushed weekly state"; exit 0; }
              echo "push attempt $i failed; retrying in 5s..."; sleep 5
            done
            echo "::error::weekly paper state committed but could NOT be pushed after 3 tries — dashboard is stale"; exit 1
          else
            echo "no state change"
          fi
